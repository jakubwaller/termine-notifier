services:
  # No reverse-proxy service: the shared `elternschule-caddy` on the same Pi
  # fronts every vhost. This `web` container joins the external `web_proxy`
  # network with alias `termine-web`, which Caddy reverse-proxies by name.
  web:
    build: { context: ., dockerfile: Dockerfile.web }
    env_file: .env
    volumes:
      - ./data:/data
    restart: unless-stopped
    expose:
      - "8000"
    networks:
      default: {}
      web_proxy:
        aliases:
          - termine-web

  poller:
    build: { context: ., dockerfile: Dockerfile.poller }
    env_file: .env
    volumes:
      - ./data:/data
    restart: unless-stopped

  backup:
    build: { context: ., dockerfile: Dockerfile.backup }
    environment:
      - DB_PATH=/data/app.db
    volumes:
      # RW (not :ro) so the backup loop can record meta.last_backup_at after
      # each successful snapshot. The script only INSERTs/UPDATEs that one
      # row; the .backup operation itself reads.
      - ./data:/data
      - /mnt/backup:/backup
    restart: unless-stopped

networks:
  web_proxy:
    external: true
